name: Publish Package

on:
  push:
    branches:
      - "releases/**"
    paths:
    - "GitVersion.yml"
  pull_request:
    branches:
      - "releases/**"
    paths:
      - "GitVersion.yml"
  workflow_dispatch:

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for NuGet.org trusted publishing
      packages: write # push to GitHub Packages
      contents: write # create the GitHub release
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install gitversion
        uses: gittools/actions/gitversion/setup@v0.11.0
        with:
          versionSpec: "5.x"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0.11.0
        with:
          useConfigFile: true

      # Branches like releases/6.0.0-beta1 publish a prerelease (6.0.0-beta.1);
      # plain releases/6.0.0 branches publish a stable 6.0.0.
      - name: Compute package version
        id: pkgver
        run: |
          if [[ "${GITHUB_REF_NAME#releases/}" == *-* ]]; then
            echo "version=${{ steps.gitversion.outputs.SemVer }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.gitversion.outputs.MajorMinorPatch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore
        working-directory: src/main/

      - name: Build .NET
        run: dotnet build HttpMachine.sln --configuration release /p:Version=${{ steps.gitversion.outputs.MajorMinorPatch }} /p:AssemblyVersion=${{ steps.gitversion.outputs.AssemblySemVer }} /p:InformationalVersion=${{ steps.gitversion.outputs.InformationalVersion }} --no-restore
        working-directory: src/main/

      - name: Pack HttpMachine
        run: dotnet pack HttpMachine.netstandard.csproj -c Release --no-build /p:Version=${{ steps.pkgver.outputs.version }}
        working-directory: src/main/HttpMachine.netstandard/

      - name: Pack IHttpMachine (Interface)
        run: dotnet pack IHttpMachine.csproj -c Release --no-build /p:Version=${{ steps.pkgver.outputs.version }}
        working-directory: src/interface/IHttpMachine/

      - name: Prep GitHub Packages
        run: dotnet nuget add source --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Publish HttpMachine to GitHub packages
        run: dotnet nuget push "*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source "github" --skip-duplicate
        working-directory: src/main/HttpMachine.netstandard/bin/Release/

      - name: Publish IHttpMachine (interface) to GitHub packages
        run: dotnet nuget push "*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source "github" --skip-duplicate
        working-directory: src/interface/IHttpMachine/bin/Release/

      - name: Pack HttpMachine for NuGet.org
        run: dotnet pack HttpMachine.netstandard.csproj -c Release --no-build /p:PackageID="HttpMachine.PCL" /p:Version=${{ steps.pkgver.outputs.version }}
        working-directory: src/main/HttpMachine.netstandard/

      # Trusted publishing: exchange a GitHub OIDC token for a temporary NuGet.org
      # API key. The key is valid for one hour, so this runs just before the pushes.
      # Requires a trusted publishing policy on nuget.org for this repository and
      # this workflow file name (build.yml).
      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: 1iveowl # nuget.org username (profile name), not an email address

      - name: Publish HttpMachine to Nuget.Org
        run: dotnet nuget push HttpMachine.PCL.*.nupkg --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        working-directory: src/main/HttpMachine.netstandard/bin/Release/

      - name: Publish IHttpMachine (interface) to Nuget.Org
        run: dotnet nuget push "*.nupkg" --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        working-directory: src/interface/IHttpMachine/bin/Release/

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1 # Note: This is deprecated but retained for compatibility
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.gitversion.outputs.AssemblySemVer }}
          release_name: Release ${{ steps.gitversion.outputs.AssemblySemVer }}
          body: |
            Changes in this Release
            - Multi-framework targeting (.NET Standard 2.0, .NET Standard 2.1, .NET 6+)
            - Split interface package from implementation package
            - DevOps improvements
          draft: true
          prerelease: true
